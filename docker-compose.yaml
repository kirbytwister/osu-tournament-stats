services:
  db:
    container_name: stats-postgres
    image: postgres:18-alpine
    restart: always
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pg_data:/var/lib/postgresql

  redis:
    container_name: stats-redis
    image: redis:8-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --appendonly yes
    ports:
      - 6380:6379

volumes:
  pg_data:
  redis_data:
